[global]
  workgroup = WORKGROUP
  server string = %h

  security = user
  map to guest = Never
  usershare allow guests = no
  restrict anonymous = 2
  username map = /etc/samba/smbusers

  ntlm auth = no

  # Use SMB2 as the minimum supported protocol
  # Uncomment NT1 only if legacy SMB1 support is required (e.g. Windows XP or older)
  server min protocol = SMB2
  # server min protocol = NT1

  logging = systemd
  log level = 1

  load printers = no
  disable spoolss = yes
  show add printer wizard = no

  create mask = 0664
  directory mask = 0775

  include = /etc/samba/machine.conf
